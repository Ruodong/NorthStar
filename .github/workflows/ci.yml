name: CI

# T8 — runs on every push + PR to verify the basics that don't need a
# live backend on 71:
#   - frontend tsc (type safety)
#   - frontend next build (JSX + RSC compilation)
#   - backend pytest -m "not live" (unit tests only; live tests hit 71)
#
# For full Playwright + axe e2e, see `e2e-manual.yml` (workflow_dispatch
# only, since the tests need 71 network reachability).

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  frontend-typecheck-and-build:
    name: Frontend — tsc + next build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (tsc --noEmit)
        run: node_modules/.bin/tsc --noEmit -p tsconfig.json

      - name: Next.js production build
        run: node_modules/.bin/next build
        env:
          # BACKEND_URL is set so next build's type-check on api-server.ts
          # resolves, even though we never actually hit the backend here.
          BACKEND_URL: http://localhost:8001

  backend-pytest-unit:
    name: Backend — pytest unit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install -r api-tests/requirements.txt

      - name: Pytest — unit tests only
        # The majority of api-tests/ hit the live stack on 71. Filter to
        # files tagged test_unit_*.py which run pure-Python logic only.
        run: |
          python -m pytest api-tests/test_unit_*.py -v --tb=short
        env:
          # Suppress warnings about .pytest_cache write permission in CI.
          PYTHONDONTWRITEBYTECODE: "1"

  # Sanity — DESIGN.md must mention the Orbital Ops aesthetic and the
  # App Detail Redesign Extensions section. Catches accidental deletes.
  design-doc-sanity:
    name: DESIGN.md sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required sections present
        run: |
          grep -q "## Typography" DESIGN.md
          grep -q "## Color" DESIGN.md
          grep -q "## App Detail Redesign Extensions" DESIGN.md
          grep -q "--accent.*#f6a623" DESIGN.md
