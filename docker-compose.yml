services:
  postgres:
    # apache/age:PG16_latest = postgres:16 + Apache AGE extension pre-built.
    # Drop-in replacement for postgres:16 — same entrypoint, same initdb hooks,
    # same data directory layout. The AGE extension is enabled on first
    # backend startup via backend/sql/018_enable_age.sql (creates extension +
    # `ns_graph` graph). Graph data lives in the same postgres_data volume.
    # See .specify/features/age-migration/spec.md.
    # TODO(post-cutover): pin to a specific digest (e.g.,
    #   apache/age:release_PG16_1.5.0) before rolling to 71.
    image: apache/age:PG16_latest
    container_name: northstar-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"   # 5432 host → 5432 container (5433 is egm-postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=northstar
      - POSTGRES_USER=northstar
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-northstar_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northstar -d northstar"]
      interval: 5s
      timeout: 5s
      retries: 10

  converter:
    build: ./scripts/converter
    image: northstar-converter
    container_name: northstar-converter
    restart: unless-stopped
    # Bind ONLY to host loopback so the host-network backend can reach it
    # at http://localhost:8080. We deliberately avoid 0.0.0.0:8080 because
    # exposing the converter to LAN would let arbitrary clients submit
    # files for conversion. Other containers on the bridge network still
    # reach it as http://converter:8080 via the compose network.
    ports:
      # 8080 on 71 is taken by another drawio container — use 8090 host-side.
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    image: northstar-backend
    container_name: northstar-backend
    restart: unless-stopped
    # network_mode: host so the backend can reach the corp Lenovo S3
    # endpoint (oss2.xcloud.lenovo.com, only routable via host VPN).
    # Bridge NAT silently drops these packets. Side effects:
    #   - `ports:` is ignored; uvicorn binds directly to host:8001
    #   - service-name DNS is gone; use localhost + published host ports
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      converter:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgresql://northstar:${POSTGRES_PASSWORD:-northstar_dev}@localhost:5434/northstar
      - CONFLUENCE_BASE_URL=${CONFLUENCE_BASE_URL:-}
      - CONFLUENCE_SEARCH_BASE_URL=${CONFLUENCE_SEARCH_BASE_URL:-}
      - CONFLUENCE_TOKEN=${CONFLUENCE_TOKEN:-}
      - CONFLUENCE_SPACE_KEY=${CONFLUENCE_SPACE_KEY:-ARD}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_ENABLED=${LLM_ENABLED:-false}
      # S3 attachment storage — disabled by default. See .env / .env.example
      # and .specify/features/s3-attachments/spec.md.
      - S3_ENABLED=${S3_ENABLED:-false}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_PREFIX=${S3_PREFIX:-pm/northstar/attachments}
      - LOCAL_DRAWIO_ROOT=/data/local_drawio
      - ATTACHMENT_ROOT=/app_data
      - PREVIEW_CACHE_ROOT=/app_cache/preview
      - CONVERTER_URL=http://localhost:8090
      - CORS_ORIGINS=*
    volumes:
      - ./data/local_drawio:/data/local_drawio:ro
      - ./data/attachments:/app_data:ro
      # Preview cache is backend-writable (separate from read-only raw
      # attachments) so converted PDFs persist across container rebuilds.
      - ./data/preview_cache:/app_cache/preview

  frontend:
    build:
      context: ./frontend
      args:
        # MUST match the runtime env var below — next.config.mjs bakes
        # this URL into the build via rewrites().
        BACKEND_URL: http://host.docker.internal:8001
    image: northstar-frontend
    container_name: northstar-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    depends_on:
      - backend
    # backend now runs on host network → no bridge DNS. Reach it via the
    # host gateway from the bridge subnet on its published host port 8001.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BACKEND_URL=http://host.docker.internal:8001
      - NODE_ENV=production

volumes:
  postgres_data:
