services:
  neo4j:
    image: neo4j:5-community
    container_name: northstar-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1G
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: northstar-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"   # 5432 host → 5432 container (5433 is egm-postgres)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    environment:
      - POSTGRES_DB=northstar
      - POSTGRES_USER=northstar
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-northstar_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northstar -d northstar"]
      interval: 5s
      timeout: 5s
      retries: 10

  converter:
    build: ./scripts/converter
    image: northstar-converter
    container_name: northstar-converter
    restart: unless-stopped
    # Intentionally NOT publishing a host port — the backend reaches
    # this service only via the docker internal network at
    # http://converter:8080. Exposing it to the host would allow
    # arbitrary LAN clients to submit files for conversion.
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    image: northstar-backend
    container_name: northstar-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      converter:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - POSTGRES_DSN=postgresql://northstar:${POSTGRES_PASSWORD:-northstar_dev}@postgres:5432/northstar
      - CONFLUENCE_BASE_URL=${CONFLUENCE_BASE_URL:-}
      - CONFLUENCE_SEARCH_BASE_URL=${CONFLUENCE_SEARCH_BASE_URL:-}
      - CONFLUENCE_TOKEN=${CONFLUENCE_TOKEN:-}
      - CONFLUENCE_SPACE_KEY=${CONFLUENCE_SPACE_KEY:-ARD}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_ENABLED=${LLM_ENABLED:-false}
      # S3 attachment storage — disabled by default. See .env / .env.example
      # and .specify/features/s3-attachments/spec.md.
      - S3_ENABLED=${S3_ENABLED:-false}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_PREFIX=${S3_PREFIX:-pm/northstar/attachments}
      - LOCAL_DRAWIO_ROOT=/data/local_drawio
      - ATTACHMENT_ROOT=/app_data
      - PREVIEW_CACHE_ROOT=/app_cache/preview
      - CONVERTER_URL=http://converter:8080
      - CORS_ORIGINS=*
    volumes:
      - ./data/local_drawio:/data/local_drawio:ro
      - ./data/attachments:/app_data:ro
      # Preview cache is backend-writable (separate from read-only raw
      # attachments) so converted PDFs persist across container rebuilds.
      - ./data/preview_cache:/app_cache/preview

  frontend:
    build: ./frontend
    image: northstar-frontend
    container_name: northstar-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
      - NODE_ENV=production

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
